baseURL = "https://mobiusone.org/"
defaultContentLanguage = "ja"
locale = "ja-JP"
title = "Contour"
theme = "contour"

# 標準的な分類（tags / categories）を有効化する。
# タグページ /tags/, 個別ターム /tags/<tag>/ が自動生成される。
[taxonomies]
  tag = "tags"
  category = "categories"

# ホームに JSON 出力を足し、/index.json を検索インデックスとして使う。
[outputs]
  home = ["html", "json"]

[params]
  # 配色。未指定ならテーマ既定（fg = #90f205 / bg = #0a0101）。
  # canvas 用の rgb 値は hex から自動算出されるので hex だけ指定すればよい。
  fg = "#f7faf9"  # 前景色（線・文字）
  bg = "#05366e"  # 背景色
  # ロゴ表示。site.Titleを太字部分と細字 TLD に分けて出す。
  logoName = "Contour"
  logoTLD = " theme"
  kicker = "Topographic Theme for Hugo"
  description = "トポグラフィックなエンジニアリング・ブログHugoテーマ。"
  # 地図風装飾ラベルの既定値。
  axis = "Elevation / Isoline Field — N=54"
  coords = "35.6812° N — 139.7671° E"

[markup]
  [markup.highlight]
    # コードは色付けせず、テーマの罫線スタイル（モノクローム）で見せる。
    codeFences = false
  [markup.goldmark.renderer]
    # 記事内で生 HTML を使えるようにする。
    unsafe = true

[[menu.main]]
  name = "Feature"
  pageRef = "/feature"
  weight = 1
[[menu.main]]
  name = "Search"
  pageRef = "/search"
  weight = 2
[[menu.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 3
[[menu.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 4
