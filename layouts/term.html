{{- /* 個別タームページ（例: /tags/graphics/）。そのタームを持つ記事一覧。 */ -}}
{{ define "main" }}
<main class="content">
  <div class="post">
    <header>
      <div class="post-meta">
        <span class="kicker">{{ .Data.Singular }}/</span>
        <span>{{ len .Pages }} entries</span>
      </div>
      <h1 class="post-title">#{{ .Title }}</h1>
    </header>

    <div class="post-body">
      {{ with .Content }}{{ . }}{{ end }}
      {{ partial "post-list.html" (dict "pages" .Pages) }}
    </div>
  </div>
</main>
{{ end }}
